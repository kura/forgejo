APP_NAME = Forgejo
RUN_MODE = prod
APP_SLOGAN = Beyond coding. We Forge.
RUN_USER = git
WORK_PATH = /data/gitea

[repository]
ROOT = /data/git/repositories

[repository.local]
LOCAL_COPY_PATH = /data/gitea/tmp/local-repo

[repository.upload]
TEMP_PATH = /data/gitea/uploads

[server]
APP_DATA_PATH = /data/gitea
DOMAIN = git.kura.gg
SSH_DOMAIN = git.kura.gg
HTTP_PORT = 3000
ROOT_URL = https://git.kura.gg/
DISABLE_SSH = false
SSH_PORT = 22
SSH_LISTEN_PORT = 22
LFS_START_SERVER = false
LFS_JWT_SECRET = <TOKEN>
OFFLINE_MODE = true
SSL_MIN_VERSION = TLSv1.2

[database]
PATH = /data/forgejo/forgejo.db
DB_TYPE = sqlite3
HOST = localhost:3306
NAME = gitea
USER = root
PASSWD =
LOG_SQL = false
SCHEMA =
SSL_MODE = disable
SQLITE_JOURNAL_MODE = WAL

[indexer]
REPO_INDEXER_ENABLED = true
ISSUE_INDEXER_PATH = /data/gitea/indexers/issues.bleve
MAX_FILE_SIZE = 1048576
REPO_INDEXER_INCLUDE =
REPO_INDEXER_EXCLUDE = resources/bin/**

[session]
PROVIDER_CONFIG = /data/gitea/sessions
PROVIDER = file

[picture]
AVATAR_UPLOAD_PATH = /data/gitea/avatars
REPOSITORY_AVATAR_UPLOAD_PATH = /data/gitea/repo-avatars

[attachment]
PATH = /data/gitea/attachments

[log]
MODE = console
LEVEL = info
ROOT_PATH = /data/forgejo/log

[security]
INSTALL_LOCK = true
SECRET_KEY = <TOKEN>
REVERSE_PROXY_LIMIT = 1
REVERSE_PROXY_TRUSTED_PROXIES = *
INTERNAL_TOKEN = <TOKEN>
PASSWORD_HASH_ALGO = argon2
LOGIN_REMEMBER_DAYS = 31
COOKIE_USERNAME = git_kura_gg_username
MIN_PASSWORD_LENGTH = 16
PASSWORD_COMPLEXITY = spec
CSRF_COOKIE_HTTP_ONLY = true
PASSWORD_CHECK_PWN = true
TWO_FACTOR_AUTH = enforced


[service]
DISABLE_REGISTRATION = true
REQUIRE_SIGNIN_VIEW = false
REGISTER_EMAIL_CONFIRM = true
ENABLE_NOTIFY_MAIL = true
ALLOW_ONLY_EXTERNAL_REGISTRATION = false
ENABLE_CAPTCHA = false
DEFAULT_KEEP_EMAIL_PRIVATE = true
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = true
NO_REPLY_ADDRESS = noreply.git.kura.gg

[lfs]
ENABLED = false
PATH = /data/git/lfs

[mailer]
ENABLED = true
SMTP_ADDR = email-smtp.eu-west-1.amazonaws.com
SMTP_PORT = 587
FROM = hello@git.kura.gg
USER = <TOKEN>
PASSWD = <TOKEN>

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[cron.update_checker]
ENABLED = true

[repository.pull-request]
DEFAULT_MERGE_STYLE = merge

[repository.signing]
DEFAULT_TRUST_MODEL = collaborator
SIGNING_KEY = /data/signing-key.pub
SIGNING_NAME = Forgejo
SIGNING_EMAIL = forgejo@git.kura.gg
SIGNING_FORMAT = ssh
INITIAL_COMMIT = always
CRUD_ACTIONS = pubkey, twofa, parentsigned
WIKI = pubkey, twofa
MERGES = pubkey, twofa, basesigned, commitssigned

[oauth2]
JWT_SECRET = <TOKEN>

[markup.asciidoc]
ENABLED = true
FILE_EXTENSIONS = .adoc,.asciidoc
RENDER_COMMAND = "asciidoctor -s -a showtitle --out-file=- -"
IS_INPUT_FILE = false

[markup.jupyter]
ENABLED = true
FILE_EXTENSIONS = .ipynb
RENDER_COMMAND = "jupyter nbconvert --stdin --stdout --to html --template basic"
IS_INPUT_FILE = false

[markup.restructuredtext]
ENABLED = true
FILE_EXTENSIONS = .rst
RENDER_COMMAND = "timeout 30s pandoc +RTS -M512M -RTS -f rst"
IS_INPUT_FILE = false

[actions]
ENABLED = true
DEFAULT_ACTIONS_URL = https://git.kura.gg

[other]
SHOW_FOOTER_VERSION = false
SHOW_FOOTER_TEMPLATE_LOAD_TIME = false
SHOW_FOOTER_POWERED_BY = false
ENABLE_FEED = false

[ui]
DEFAULT_THEME = forgejo-dark-deuteranopia-protanopia
EXPLORE_PAGING_NUM = 50
ISSUE_PAGING_NUM = 50
MEMBERS_PAGING_NUM = 50
FEED_PAGING_NUM = 50
SITEMAP_PAGING_NUM = 50
GRAPH_MAX_COMMIT_NUM = 200
CODE_COMMENT_LINES = 10

[ui.user]
REPO_PAGING_NUM = 30

[ui.meta]
AUTHOR = Forgejo
DESCRIPTION = Beyond coding. We Forge.
