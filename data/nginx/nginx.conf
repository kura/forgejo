user nginx;
pid /run/nginx.pid;

worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    types_hash_max_size 2048;

    server_names_hash_bucket_size 64;
    server_name_in_redirect off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    reset_timedout_connection on;
    send_timeout 10;
    client_body_timeout 10;
    keepalive_timeout 30;
    keepalive_requests 1000;
    ssl_dyn_rec_enable on;

    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # requires openssl 4.0
    log_format custom '$remote_addr - $remote_user $time_iso8601 $request $status $bytes_sent $body_bytes_sent $request_time $request_length $upstream_addr $upstream_cache_status $upstream_status $upstream_connect_time $upstream_header_time $upstream_response_time $upstream_response_length $connection $connection_requests $http_host $http_user_agent $http_referer $http_range $tcpinfo_rtt $tcpinfo_rttvar $tcpinfo_snd_cwnd $tcpinfo_rcv_space $ssl_protocol $ssl_cipher $ssl_session_reused $ssl_session_id ECH:$ssl_ech_status:$ssl_ech_outer_server_name $ssl_server_name';
    # log_format custom '$remote_addr - $remote_user $time_iso8601 $request $status $bytes_sent $body_bytes_sent $request_time $request_length $upstream_addr $upstream_cache_status $upstream_status $upstream_connect_time $upstream_header_time $upstream_response_time $upstream_response_length $connection $connection_requests $http_host $http_user_agent $http_referer $http_range $tcpinfo_rtt $tcpinfo_rttvar $tcpinfo_snd_cwnd $tcpinfo_rcv_space $ssl_protocol $ssl_cipher $ssl_session_reused $ssl_session_id $ssl_server_name';
    access_log /var/log/nginx/access.log custom if=$excluded_ua;
    error_log /var/log/nginx/error.log debug;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 9;
    gzip_buffers 32 4k;
    gzip_types text/plain text/html text/javascript text/css application/json application/javascript application/xml application/xml+rss;

    brotli on;
    brotli_comp_level 9;
    brotli_buffers 32 4k;
    brotli_types text/plain text/html text/javascript text/css application/json application/javascript application/xml application/xml+rss;

    zstd on;
    zstd_comp_level 9;
    zstd_buffers 32 4k;
    zstd_types text/plain text/html text/javascript text/css application/json application/javascript application/xml application/xml+rss;

    resolver 1.1.1.1:53 1.0.0.1:53 ipv6=off;

    acme_shared_zone zone=ngx_acme_shared:1M;
    acme_issuer letsencrypt {
        account_key ecdsa:384;
        uri https://acme-v02.api.letsencrypt.org/directory;
        state_path /var/cache/nginx/acme-letsencrypt;
        accept_terms_of_service;
        profile shortlived;
    }

    proxy_cache_path /var/cache/nginx/proxy_cache levels=1:2 keys_zone=forgejo:100m max_size=3g inactive=180m;
    proxy_temp_path /var/cache/nginx/proxy_cache_temp 1 2;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    upstream forgejo {
        server forgejo:3000;
    }

    upstream anubis {
        server anubis:8080;
    }

    map $http_sec_fetch_mode $early_hints { 
        navigate $http2$http3; 
    }

    map $http_user_agent $ai_user_agent {
        default 0;
        include ai-ua.map;
    }

    map $http_user_agent $excluded_ua {
        ~Uptime-Kuma 0;
        ~status.kura.gg 0;
        default 1;
    }

    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=10r/s;

    include naxsi/naxsi_core.rules;
    include naxsi/blocking/*.rules;
    # Naxsi whitelist
    BasicRule wl:11,1002,1016,1101,1315;
    BasicRule wl:10000034,20000000,20000001,20000002,20000003,20000004,20000005,20000006,20000007,20000008,20000009,20000010,20000011,20000012,20000013,20000014,20000015,20000016,20000017,20000018,20000019,20000020,20000045,20000075,20000076,20000079,20000080,20000081,20000093 "mz:URL";

    lua_package_path "/usr/lib/lua/?.lua;;";

    server { 
        listen 80;

        location / { 
            return 404; 
        }

        location /uptime-kuma {
            access_log off;
            return 404;
        }

        location /status {
            access_log off;
            return 200;
        }
    }

    server {
        listen 443 ssl reuseport multipath so_keepalive=on;
        listen [::]:443 ssl reuseport multipath so_keepalive=on;
        listen 443 quic reuseport;
        listen [::]:443 quic reuseport;

        # h2... just use h3
        # http2 on;
        http3 on;

        quic_gso on;
        quic_retry on;
        ssl_early_data on;

        server_name git.kura.gg 46.62.173.123 2a01:4f9:c013:f9a1::1;

        acme_certificate letsencrypt key=ecdsa:384;
        ssl_certificate $acme_certificate; 
        ssl_certificate_key $acme_certificate_key; 
        ssl_certificate_cache max=2; 
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSLSessioncache:1m;
        ssl_session_tickets on;
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ecdh_curve X25519:prime256v1:secp384r1;
        ssl_certificate_compression on;
        ssl_conf_command Options KTLS;
        # requires openssl 4.0
        ssl_ech_file /etc/nginx/git.kura.gg.pem.ech;

        add_header Strict-Transport-Security "max-age=15552000" always;
        add_header Access-Control-Allow-Headers "Origin,Range,Accept-Encoding" always;
        add_header Access-Control-Expose-Headers "Server,Range,Date,Content-Length,Content-Range,Content-Location,Location" always;
        add_header Access-Control-Allow-Methods "GET,HEAD,POST" always;
        add_header Access-Control-Allow-Origin "https://git.kura.gg" always;
        add_header Access-Control-Max-Age "86400" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Xss-Protection "1; mode=block" always;
        add_header X-Clacks-Overhead "GNU Terry Pratchett" always;
        add_header X-Cache-Action $upstream_cache_status always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;

        client_max_body_size 32M;

        proxy_set_header Connection $http_connection;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Http-Version $server_protocol;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_valid any 30d;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        proxy_ignore_headers Cache-Control;
        proxy_ignore_headers Expires;

        early_hints $early_hints;

        if ($ai_user_agent) {
            return 403;
        }

        limit_conn conn_limit_per_ip 20;
        limit_req zone=req_limit_per_ip burst=20 nodelay;

        location ~* ^/(assets|avatars) {
            proxy_cache forgejo;
            proxy_pass http://anubis;
        }

        location / {
            SecRulesEnabled;
            LibInjectionSql;
            LibInjectionXss;
            DeniedUrl "/denied";
            CheckRule "$SQL >= 8" BLOCK;
            CheckRule "$XSS >= 8" BLOCK;
            CheckRule "$RFI >= 8" BLOCK;
            CheckRule "$EVADE >= 8" BLOCK;
            CheckRule "$UPLOAD >= 5" BLOCK;
            CheckRule "$TRAVERSAL >= 5" BLOCK;
            CheckRule "$UWA >= 8" BLOCK;
            CheckRule "$LIBINJECTION_XSS >= 8" BLOCK;
            CheckRule "$LIBINJECTION_SQL >= 8" BLOCK;

            proxy_pass http://anubis;
        }

        location ~* ^/api/actions/runner.v1.RunnerService {
            access_log off;
            proxy_pass http://forgejo;
        }

        location /uptime-kuma {
            return 404;
        }

        location /denied {
            internal;
            return 403;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}

stream {
    upstream forgejo {
        server forgejo:222;
    }

    server {
        listen 22;
        access_log off;
        proxy_pass forgejo;
    }
}
